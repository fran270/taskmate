<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title> Mi Perfil </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Avatar y nombre -->
  <div class="profile-header">
    <ion-avatar class="profile-avatar">
      <img
        src="https://ui-avatars.com/api/?name=Francisco+Jose&background=random&color=fff"
      />
    </ion-avatar>
    <h2>Francisco José</h2>
    <p>2º DAM</p>
    <ion-badge color="primary">Developer en formación</ion-badge>
  </div>

  <!-- Tecnologías que conoces -->
  <ion-card>

    <ion-card-header>
      <ion-card-subtitle>Stack tecnológico</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-chip color="primary">
        <ion-label>HTML/CSS</ion-label>
      </ion-chip>
      <ion-chip color="secondary">
        <ion-label>JavaScript</ion-label>
      </ion-chip>
      <ion-chip color="secondary">
        <ion-label>PHP</ion-label>
      </ion-chip>
      <ion-chip color="secondary">
        <ion-label>Python</ion-label>
      </ion-chip>
      <ion-chip color="tertiary">
        <ion-label>Angular</ion-label>
      </ion-chip>
      <ion-chip>
        <ion-label>Ionic</ion-label>
      </ion-chip>
    </ion-card-content>
    
  </ion-card>

  <!-- Lista de info -->
  <ion-list>
    <ion-item>
      <ion-icon name="school" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Centro</h3>
        <p>IES La Puebla — Almería</p>
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="calendar" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h3>Curso</h3>
        <p>2024/2025</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-segment>
    <ion-segment-button>Mis Tareas</ion-segment-button>
    <ion-segment-button>Estadisticas</ion-segment-button>
  </ion-segment>
  
</ion-content>
