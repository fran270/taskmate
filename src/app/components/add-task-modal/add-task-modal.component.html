<form [formGroup]="taskForm">
  <ion-item [class.ion-invalid]="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
    <ion-label position="floating">Título *</ion-label>
    <ion-input formControlName="title"></ion-input>
    <ion-note slot="error">{{ titleError }}</ion-note>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Descripción</ion-label>
    <ion-textarea formControlName="description" rows="3"></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label>Prioridad</ion-label>
    <ion-select formControlName="priority">
      <ion-select-option value="alta">🔴 Alta</ion-select-option>
      <ion-select-option value="media">🟡 Media</ion-select-option>
      <ion-select-option value="baja">🟢 Baja</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Categoría</ion-label>
    <ion-select formControlName="category">
      <ion-select-option value="personal">Personal</ion-select-option>
      <ion-select-option value="trabajo">Trabajo</ion-select-option>
      <ion-select-option value="estudio">Estudio</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="save()" [disabled]="taskForm.invalid">
    Guardar Tarea
  </ion-button>
</form>
