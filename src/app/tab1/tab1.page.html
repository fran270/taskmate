<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>TaskMate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="welcome-section">
    <h2>¡Hola, Developer! 👋</h2>
    <p>Tienes <strong>{{ stats.pending }} tareas</strong> pendientes.</p>
  </div>

  <ion-card>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col class="stat-col">
            <div class="stat-number">{{ stats.total }}</div>
            <div class="stat-label">Total</div>
          </ion-col>
          <ion-col class="stat-col">
            <div class="stat-number" style="color: var(--ion-color-success)">{{ stats.completed }}</div>
            <div class="stat-label">Hechas</div>
          </ion-col>
          <ion-col class="stat-col">
            <div class="stat-number" style="color: var(--ion-color-warning)">{{ stats.pending }}</div>
            <div class="stat-label">Pendientes</div>
          </ion-col>
        </ion-row>
      </ion-grid>

      <!-- Barra de progreso -->
      <div class="ion-margin-top">
        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
          <small>Progreso del día</small>
          <small>{{ stats.total > 0 ? ((stats.completed / stats.total) * 100 | number:'1.0-0') : 0 }}%</small>
        </div>
        <ion-progress-bar
          [value]="stats.total > 0 ? stats.completed / stats.total : 0"
          color="success">
        </ion-progress-bar>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-content>
    <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
      <ion-refresher-content></ion-refresher-content>
    </ion-refresher>
    <!-- ... resto del contenido ... -->
  </ion-content>
  
</ion-content>
