<ion-header>
  <ion-toolbar color="primary">
    <ion-title>TaskMate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Saludo personalizado -->
  <div class="welcome-section">
    <h2>¡Hola, Developer! 👋</h2>
    <p>Tienes <strong>0 tareas</strong> pendientes hoy.</p>
  </div>

  <!-- Tarjeta de resumen -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Resumen del día</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col class="stat-col">
            <div class="stat-number">0</div>
            <div class="stat-label">Pendientes</div>
          </ion-col>
          <ion-col class="stat-col">
            <div class="stat-number">0</div>
            <div class="stat-label">Completadas</div>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
   
  </ion-card>

  <ion-card-header>
    <ion-card-title>Tareas Recientes</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-list>
      <ion-item>Tarea1</ion-item>
      <ion-item>Tarea2</ion-item>
      <ion-item>Tarea3</ion-item>
    </ion-list>
  </ion-card-content>

  <ion-card-header>
    <ion-card-title>Progreso</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-progress-bar value="0.125"></ion-progress-bar>
  </ion-card-content>
 

  <!-- Botón de acción principal -->
  <ion-button expand="block" color="primary" class="ion-margin-top">
    <ion-icon name="add" slot="start"></ion-icon>
    Nueva Tarea
  </ion-button>
</ion-content>
